name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -X utf8 -m pip install build
      - name: Build distributions
        run: python -X utf8 -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
